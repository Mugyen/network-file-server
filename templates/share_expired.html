<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Expired - Network File Server</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 1rem;
            background: #f5f5f5; color: #1a1a1a;
        }
        .card {
            background: #fff; border-radius: 12px; padding: 2.5rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            max-width: 420px; width: 100%; text-align: center;
        }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
        h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; color: #333; }
        .app-title { font-size: 0.8rem; color: #888; margin-bottom: 1.5rem; }
        p { font-size: 0.95rem; color: #666; line-height: 1.5; }
        @media (prefers-color-scheme: dark) {
            body { background: #111; color: #e5e5e5; }
            .card { background: #1e1e1e; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
            h1 { color: #e5e5e5; }
            .app-title { color: #888; }
            p { color: #aaa; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">&#9200;</div>
        <h1>This link has expired</h1>
        <p class="app-title">Network File Server</p>
        <p>This share link is no longer valid. It may have expired or been revoked. Please ask the sender for a new link.</p>
    </div>
</body>
</html>
