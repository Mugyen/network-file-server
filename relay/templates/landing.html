{% extends "base.html" %}

{% block title %}WiFi File Server{% endblock %}

{% block content %}
  <h1>WiFi File Server</h1>
  <p>
    Enter a mount code to browse a shared WiFi File Server.
    Mount codes are shown in the WiFi File Server app on the host device.
  </p>
  <form method="get" action="/">
    <input type="text" name="code" placeholder="Enter mount code" autocomplete="off" autofocus />
    <button type="submit">Connect</button>
  </form>
{% endblock %}
