<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Network File Server{% endblock %}</title>
  {% block og_tags %}
  <meta property="og:title" content="{% block og_title %}Network File Server{% endblock %}" />
  <meta property="og:description" content="{% block og_description %}Share files instantly -- scan QR, drop files, done.{% endblock %}" />
  <meta property="og:image" content="{{ og_image_url | default('/static/og-image.png') }}" />
  <meta property="og:type" content="website" />
  {% endblock %}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --fg: #1a1a1a;
      --card-bg: #ffffff;
      --card-border: #e0e0e0;
      --input-border: #cccccc;
      --btn-bg: #2563eb;
      --btn-fg: #ffffff;
      --btn-hover: #1d4ed8;
      --muted: #6b7280;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111827;
        --fg: #f9fafb;
        --card-bg: #1f2937;
        --card-border: #374151;
        --input-border: #4b5563;
        --btn-bg: #3b82f6;
        --btn-fg: #ffffff;
        --btn-hover: #2563eb;
        --muted: #9ca3af;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 2rem;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    p {
      color: var(--muted);
      font-size: 0.9375rem;
      line-height: 1.6;
      margin-bottom: 1.25rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    input[type="text"] {
      border: 1px solid var(--input-border);
      border-radius: 8px;
      padding: 0.625rem 0.875rem;
      font-size: 1rem;
      background: var(--card-bg);
      color: var(--fg);
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: var(--btn-bg);
    }

    button {
      background: var(--btn-bg);
      color: var(--btn-fg);
      border: none;
      border-radius: 8px;
      padding: 0.625rem 1.25rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: var(--btn-hover); }

    .hero-container {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 2.5rem 2rem;
      max-width: 640px;
      width: 100%;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .hero-container h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .how-it-works {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin: 1.5rem 0;
      padding: 1rem 0;
      border-top: 1px solid var(--card-border);
      border-bottom: 1px solid var(--card-border);
    }

    .how-it-works .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.875rem;
      color: var(--muted);
    }

    .how-it-works .step .step-icon {
      font-size: 1.5rem;
    }

    .hero-container form {
      max-width: 320px;
      margin: 0 auto;
    }

    .hero-links {
      margin-top: 1.25rem;
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      font-size: 0.875rem;
    }

    .hero-links a {
      color: var(--btn-bg);
      text-decoration: none;
    }

    .hero-links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .how-it-works {
        flex-direction: column;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="{% block container_class %}card{% endblock %}">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
